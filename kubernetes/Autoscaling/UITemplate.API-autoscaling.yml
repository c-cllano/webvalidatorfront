apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: uitemplate
  namespace: pre-microservice
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: uitemplate

  minReplicas: 5
  maxReplicas: 40

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 10
        periodSeconds: 15
      selectPolicy: Max

    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
      - type: Pods
        value: 1
        periodSeconds: 30

  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 30

  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 50