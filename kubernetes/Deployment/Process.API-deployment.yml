apiVersion: apps/v1
kind: Deployment
metadata:
  name: process
  namespace: pre-microservice
spec:
  replicas: 5
  selector:
    matchLabels:
      app: process
  template:
    metadata:
      labels:
        app: process
    spec:
      nodeSelector:
        kubernetes.io/os: linux
        kubernetes.io/arch: amd64
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - process
              topologyKey: "kubernetes.io/hostname"
      containers:
        - name: process
          image: #{ACR_NAME}#.azurecr.io/nextgenid.api.process:v.#{Build.BuildId}#
          resources:
              requests:
                cpu: 50m
                memory: 384Mi
                ephemeral-storage: 2000Mi
              limits:
                cpu: 300m
                memory: 2000Mi
                ephemeral-storage: 5000Mi
          ports:
            - containerPort: 7292
          envFrom:
            - configMapRef:
                name: process-config
          env:
            - name: ASPNETCORE_URLS
              value: http://+:7292
            - name: TARGET_PLATFORMS
              value: linux/amd64,linux/arm64
