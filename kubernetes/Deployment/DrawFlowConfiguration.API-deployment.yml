apiVersion: apps/v1
kind: Deployment
metadata:
  name: drawflowconfiguration
  namespace: pre-microservice
spec:
  replicas: 5
  selector:
    matchLabels:
      app: drawflowconfiguration
  template:
    metadata:
      labels:
        app: drawflowconfiguration
    spec:
      nodeSelector:
        kubernetes.io/os: linux
        kubernetes.io/arch: amd64
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - drawflowconfiguration
              topologyKey: "kubernetes.io/hostname"
      containers:
        - name: drawflowconfiguration
          image: #{ACR_NAME}#.azurecr.io/nextgenid.api.drawflowconfiguration:v.#{Build.BuildId}#
          resources:
              requests:
                cpu: 25m
                memory: 256Mi
                ephemeral-storage: 2000Mi
              limits:
                cpu: 300m
                memory: 500Mi
                ephemeral-storage: 5000Mi
          ports:
            - containerPort: 7250
          envFrom:
            - configMapRef:
                name: drawflowconfiguration-config
          env:
            - name: ASPNETCORE_URLS
              value: http://+:7250
            - name: TARGET_PLATFORMS
              value: linux/amd64,linux/arm64
