apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: webflow
  namespace: pre-microservice
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: webflow
  minReplicas: 1
  maxReplicas: 2
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 180  # Espera 180s antes de escalar hacia arriba
      policies:
      - type: Pods
        value: 1   # Aumenta en un 1 las réplicas si se dispara el uso
        periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 180  # Espera 180s antes de reducir réplicas
      policies:
      - type: Pods
        value: 1   # Reduce en un 1 las réplicas por paso
        periodSeconds: 30
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85